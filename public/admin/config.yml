local_backend: true

backend:
  name: github
  repo: lstsc/lstsc.github.io    # ← 改成你們實際的 owner/repo
  branch: main                   # 或 master，看你們用哪個

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title (ZH)", name: "titleZh", widget: "string" }
      - { label: "Title (EN)", name: "titleEn", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Summary (ZH)", name: "summaryZh", widget: "text", required: false }
      - { label: "Summary (EN)", name: "summaryEn", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Cover", name: "cover", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }